<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self';" />
  <title>Veil — Practice Interview</title>
  <style>
    :root{--bg:#0a0b0f;--panel:#14161e;--stroke:rgba(255,255,255,.09);--stroke2:rgba(255,255,255,.16);--text:#f3f4f8;--muted:#9aa1b2;--accent:#8b7bf0;--accent2:#6ee7d2;--bad:#ff6b6b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--stroke);}
    .dot{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent2),var(--accent));box-shadow:0 0 10px var(--accent);}
    header b{font-size:15px;letter-spacing:-.01em;} header span{color:var(--muted);font-size:13px;}
    .wrap{flex:1;display:grid;grid-template-columns:300px 1fr;gap:16px;padding:16px 20px;min-height:0;}
    .side{display:flex;flex-direction:column;gap:14px;}
    video{width:100%;aspect-ratio:4/3;background:#05060a;border:1px solid var(--stroke);border-radius:14px;object-fit:cover;transform:scaleX(-1);}
    .cam-off{display:grid;place-items:center;color:var(--muted);font-size:13px;text-align:center;padding:10px;}
    label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}
    textarea,input,select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--stroke);border-radius:10px;color:var(--text);font:inherit;font-size:14px;padding:10px 12px;outline:none;resize:vertical;}
    textarea:focus,input:focus{border-color:var(--accent);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--stroke2);border-radius:11px;padding:11px 16px;font-size:14px;font-weight:600;color:var(--text);background:rgba(255,255,255,.04);cursor:pointer;transition:all .15s;}
    .btn:hover{background:rgba(255,255,255,.1);}
    .btn.fill{background:linear-gradient(135deg,var(--accent),#6a5ae0);border-color:transparent;color:#fff;}
    .btn.fill:hover{filter:brightness(1.1);}
    .btn.rec.on{background:rgba(255,107,107,.18);border-color:rgba(255,107,107,.5);color:#fff;}
    .btn:disabled{opacity:.45;cursor:default;}
    .main{display:flex;flex-direction:column;min-height:0;}
    .feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:6px;}
    .msg{max-width:88%;padding:12px 15px;border-radius:14px;font-size:14px;line-height:1.5;}
    .msg.q{background:var(--panel);border:1px solid var(--stroke);border-top-left-radius:4px;align-self:flex-start;}
    .msg.a{background:rgba(139,123,240,.16);border:1px solid rgba(139,123,240,.3);border-top-right-radius:4px;align-self:flex-end;}
    .msg .who{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;letter-spacing:.4px;}
    .msg strong{color:#fff;} .msg ul{padding-left:18px;margin-top:4px;}
    .answer-row{display:flex;gap:8px;margin-top:12px;}
    .answer-row textarea{flex:1;min-height:52px;max-height:120px;}
    .controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .empty{margin:auto;text-align:center;color:var(--muted);max-width:360px;}
    .empty h2{font-size:20px;margin-bottom:8px;color:var(--text);}
    .pill{display:inline-block;font-size:12px;color:var(--accent2);background:rgba(110,231,210,.1);border:1px solid rgba(110,231,210,.25);padding:5px 12px;border-radius:999px;margin-bottom:16px;}
    .thinking{align-self:flex-start;color:var(--muted);font-size:13px;padding:8px 4px;}
    .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent2);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle;margin-right:7px;}
    @keyframes s{to{transform:rotate(360deg);}}
    ::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px;}
  </style>
</head>
<body>
  <header><span class="dot"></span><b>Practice Interview</b><span>· AI interviewer · for your eyes only</span></header>
  <div class="wrap">
    <div class="side">
      <div>
        <video id="cam" autoplay muted playsinline></video>
      </div>
      <div>
        <label>Role / context</label>
        <textarea id="role" rows="3" placeholder="e.g. Senior Frontend Engineer at a fintech startup. Focus on React, system design, and behavioral."></textarea>
      </div>
      <label class="row" style="display:flex;align-items:center;gap:8px;color:var(--text);font-size:13px;"><input type="checkbox" id="speak" checked style="width:auto;"/> Interviewer speaks aloud</label>
      <button class="btn fill" id="startBtn">Start interview ▶</button>
      <button class="btn" id="endBtn" disabled>End &amp; get scorecard</button>
    </div>

    <div class="main">
      <div class="feed" id="feed">
        <div class="empty" id="empty">
          <div class="pill">⬤ Realistic mock interview</div>
          <h2>Practice like it's real.</h2>
          <p>Fill in the role on the left and hit Start. The AI interviewer asks one question at a time, reacts to your answers, and scores you at the end. Answer by typing or by voice.</p>
        </div>
      </div>
      <div class="answer-row" id="answerRow" style="display:none;">
        <textarea id="answer" placeholder="Type your answer… (or use 🎤)"></textarea>
      </div>
      <div class="controls" id="controls" style="display:none;">
        <button class="btn fill" id="sendBtn">Send answer →</button>
        <button class="btn rec" id="recBtn">🎤 Speak</button>
      </div>
    </div>
  </div>
  <script src="practice.js"></script>
</body>
</html>

name: Build macOS app

# How to use (no terminal needed):
#   GitHub repo -> Actions tab -> "Build macOS app" -> "Run workflow" button.
#   When it finishes (~5 min), the .dmg is attached to the v0.1.0 Release and
#   downloadable from the run's Artifacts.
#
# SIGNING: this workflow auto-detects whether Apple signing secrets are set.
#   - If MAC_CERT_P12 (+ the other Apple secrets) exist  -> SIGNED + NOTARIZED dmg
#     (opens with no Gatekeeper warning).
#   - If they don't exist yet                            -> unsigned dmg
#     (works, but shows the "Apple could not verify" warning).
# Add these repo secrets to turn on notarization (see MAC.md for how to get them):
#   MAC_CERT_P12, MAC_CERT_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#
# This workflow never touches the Windows build.

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      # 'true' only when the certificate secret is present. (secrets can't be used
      # directly in step `if:` conditions, so we surface it as an env var here.)
      HAS_SIGNING: ${{ secrets.MAC_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Import Apple Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/cert.p12

      - name: Build .dmg (signed + notarized)
        if: env.HAS_SIGNING == 'true'
        run: npm run dist:mac -- --publish never -c.mac.notarize=true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build .dmg (unsigned)
        if: env.HAS_SIGNING != 'true'
        run: npm run dist:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload .dmg as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Veil-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach .dmg to the v0.1.0 Release
        run: gh release upload v0.1.0 dist/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
